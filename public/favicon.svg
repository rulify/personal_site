<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- hazard-chevron mark: the site's stripe signature as a tab icon -->
  <defs><clipPath id="t"><rect width="64" height="64" rx="12"/></clipPath></defs>
  <rect width="64" height="64" rx="12" fill="#0f141c"/>
  <g clip-path="url(#t)" transform="rotate(-45 32 32)">
    <rect x="-20" y="14" width="104" height="9" fill="#a48ae8"/>
    <rect x="-20" y="29" width="104" height="9" fill="#505d6d"/>
    <rect x="-20" y="44" width="104" height="9" fill="#3d177f"/>
  </g>
  <rect x="1" y="1" width="62" height="62" rx="11" fill="none" stroke="#35404c" stroke-width="2"/>
</svg>
